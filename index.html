<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopSwift - E-Commerce & Courier App</title>
</head>
<body style="font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f6f9;">

    <header style="background-color: #1a1a2e; color: #ffffff; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center;">
        <h2 style="margin: 0; color: #e94560;">ShopSwift</h2>
        <nav>
            <span style="margin-right: 20px; cursor: pointer; font-weight: bold;">Products</span>
            <span style="margin-right: 20px; cursor: pointer; font-weight: bold;">Cart (0)</span>
            <span style="cursor: pointer; color: #00fff5; font-weight: bold;" id="track-btn">Track Courier</span>
        </nav>
    </header>

    <main style="max-width: 1100px; margin: 40px auto; padding: 0 20px;">
        
        <div style="background: linear-gradient(135deg, #162447, #1a1a2e); color: white; padding: 40px; border-radius: 8px; text-align: center; margin-bottom: 30px;">
            <h1 style="margin: 0 0 10px 0;">E-Commerce & Courier System</h1>
            <p style="color: #cbd5e1; margin: 0;">Browse products, add items to your cart, and simulate real-time delivery logistics.</p>
        </div>

        <div id="main-display">
            <h3 style="text-align: center; color: #475569;">Your system frontend is ready for code integration.</h3>
        </div>

    </main>

</body>
</html>
